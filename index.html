<!DOCTYPE html>
<html>
<head>
  <title>Prompt Optimizer</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      max-width: 800px;
      margin: 40px auto;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }

    .prompt-text {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.5;
    }

    .reason-text {
      margin-top: 10px;
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<h1>Prompt Optimizer Agent</h1>

<input id="apikey" placeholder="Enter your OpenAI API key" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; border:none;" />
<textarea id="input" placeholder="Enter your prompt..."></textarea>
<button onclick="optimize()">Optimize</button>

<div id="result"></div>

<script>
async function optimize() {
  const prompt = document.getElementById("input").value;

  const apiKey = document.getElementById("apikey").value;

  if (!apiKey || !apiKey.startsWith("sk-")) {
    document.getElementById("result").innerHTML = `
      <div class="box">
        <h3>Error</h3>
        <pre>Please enter a valid OpenAI API key</pre>
      </div>
    `;
    return;
  }

  const res = await fetch("http://45.76.217.135:3001/optimize", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt, apiKey })
  });

  const data = await res.json();


  if (data.error) {
    document.getElementById("result").innerHTML = `
      <div class="box">
        <h3>Error</h3>
        <pre>${data.error}</pre>
        <pre>${JSON.stringify(data.details, null, 2)}</pre>
      </div>
    `;
    return;
  }

  let html = "";

  data.versions.forEach(v => {
    html += `
      <div class="box">
        <h3>${v.style}</h3>
        <div class="prompt-text">${v.prompt}</div>
        <p>Score: clarity ${v.score.clarity}, specificity ${v.score.specificity}, effectiveness ${v.score.effectiveness}</p>
      </div>
    `;
  });


  let bestPrompt = data.best_version;


  if (data.versions && typeof data.best_version === "string") {
    const found = data.versions.find(v => v.style === data.best_version);
    if (found) {
      bestPrompt = found.prompt;
    }
  }

 html += `
  <div class="box">
    <h3>Best Version (${data.best_version})</h3>
    <div class="prompt-text">${bestPrompt || "Not found"}</div>
    <div class="reason-text">${data.reason}</div>
  </div>
 `;

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
